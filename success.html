<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commande confirmée - Tradiscout</title>
  <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="FINAL (1).png">
  <style>
    :root {
      --navy: #2C3776;
      --bg: #F8F2E7;
      --or: #c9a84c;
      --gris: #6b6b6b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--navy);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      padding: 1.4rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(44,55,118,0.12);
      position: sticky; top: 0;
      background: rgba(248,242,231,0.96);
      backdrop-filter: blur(8px);
      z-index: 100;
    }
    .logo {
      font-family: 'Uncial Antiqua', serif;
      font-size: 1.5rem;
      color: var(--navy);
      text-decoration: none;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
    }

    .success-wrap {
      max-width: 480px;
      width: 100%;
      text-align: center;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .check-icon {
      width: 56px; height: 56px;
      border: 2px solid var(--or);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 2rem;
      font-size: 1.4rem;
      color: var(--or);
    }

    .success-title {
      font-family: 'Uncial Antiqua', serif;
      font-size: 2rem;
      line-height: 1.15;
      margin-bottom: 1rem;
    }

    .success-msg {
      font-size: 0.68rem;
      color: var(--gris);
      line-height: 1.8;
      letter-spacing: 0.04em;
      margin-bottom: 2.5rem;
    }

    .back-btn {
      display: inline-block;
      padding: 0.75rem 1.8rem;
      border: 1px solid var(--navy);
      background: transparent;
      color: var(--navy);
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      transition: 0.2s;
      cursor: pointer;
    }
    .back-btn:hover {
      background: var(--navy);
      color: var(--bg);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid rgba(44,55,118,0.12);
      padding: 1.5rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
      background: rgba(248,242,231,0.6);
    }
    .footer-copy {
      font-size: 0.58rem;
      color: var(--gris);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a {
      font-size: 0.58rem;
      color: var(--navy);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.55;
      transition: opacity 0.15s;
    }
    .footer-links a:hover { opacity: 1; }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">Tradiscout</a>
</header>

<main>
  <div class="success-wrap">
    <div class="check-icon">✓</div>
    <div class="success-title">Commande confirmée</div>
    <p class="success-msg">
      Merci pour ta commande !<br>
      Tu recevras un email de confirmation Stripe avec tous les détails.<br>
      Nous traiterons ta commande dans les meilleurs délais.
    </p>
    <a class="back-btn" href="/">← Retour à la boutique</a>
  </div>
</main>

<footer>
  <div class="footer-copy">© Tradiscout 2026</div>
  <div class="footer-links">
    <a href="mailto:tradiscout@gmail.com" target="_blank">Contact</a>
    <a href="Rapport Technique et Commercial.pdf" target="_blank">Détails</a>
    <a href="Politiques Commceriales et Clauses de Vente.pdf" target="_blank">Livraison</a>
    <a href="Protection des Données et conformité RGPD.pdf" target="_blank">Termes</a>
  </div>
</footer>

</body>
</html>
