<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boutique Tradiscout</title>
    <link rel="icon" type="image/x-icon" href="FINAL.png">
    <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        :root { --navy: #2C3776; --bg: #F8F2E7; --or: #c9a84c; --gris: #6b6b6b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--navy); font-family: 'DM Mono', monospace; min-height: 100vh; overflow-x: hidden; }

        header { position: sticky; top: 0; z-index: 600; background: rgba(248, 242, 231, 0.96); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(44,55,118,0.12); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 64px; }
        .logo { font-family: 'Uncial Antiqua', serif; text-transform: uppercase; letter-spacing: 2px; font-size: 1.6rem; color: var(--navy); text-decoration: none; }
        .main-nav { display: flex; gap: 32px; align-items: center; }
        .main-nav a { text-decoration: none; color: var(--navy); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: lowercase; opacity: 0.4; transition: 0.2s; position: relative; padding-bottom: 3px; }
        .main-nav a:hover, .main-nav a.active { opacity: 1; }
        .main-nav a.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 1px; background: var(--navy); }

        /* RIDEAU DE PROTECTION */
        #shop-curtain {
            position: fixed;
            top: 64px; /* Sous le header */
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg);
            z-index: 800;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .curtain-title { font-family: 'Uncial Antiqua', serif; font-size: 2rem; margin-bottom: 10px; color: var(--navy); }
        .curtain-sub { font-size: 0.8rem; letter-spacing: 0.1em; opacity: 0.6; text-transform: uppercase; }
        
        /* Accès admin discret */
        .admin-unlock { position: absolute; bottom: 20px; right: 20px; display: flex; align-items: center; gap: 8px; }
        #adminInput { 
            display: none; padding: 5px 10px; border: 1px solid rgba(44,55,118,0.2); 
            background: white; font-family: 'DM Mono'; font-size: 0.6rem; outline: none; 
        }
        .lock-icon { cursor: pointer; opacity: 0.2; transition: 0.3s; font-size: 0.8rem; }
        .lock-icon:hover { opacity: 1; }

        /* PANIER FIXE */
        .cart-btn-fixed { position: fixed; bottom: 30px; right: 30px; z-index: 700; background: var(--navy); border: none; color: var(--bg); padding: 1rem 1.5rem; cursor: pointer; display: flex; align-items: center; gap: 12px; font-family: 'DM Mono', monospace; font-size: 0.75rem; text-transform: lowercase; box-shadow: 0 10px 30px rgba(44,55,118,0.2); }
        .cart-count { background: var(--or); color: white; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; }

        /* CONTENU BOUTIQUE */
        .top-info-bar { max-width: 1100px; margin: 40px auto 0; padding: 20px 5%; display: flex; justify-content: space-between; align-items: flex-start; gap: 60px; }
        .info-text p { font-size: 0.75rem; line-height: 2; margin-bottom: 15px; max-width: 550px; }
        .info-links { display: flex; flex-direction: column; gap: 12px; text-align: right; }
        .info-links a { font-size: 0.55rem; text-transform: uppercase; color: var(--navy); opacity: 0.5; text-decoration: none; letter-spacing: 0.12em; transition: 0.2s; }
        .info-links a:hover { opacity: 1; color: var(--or); }

        .grid-wrap { max-width: 1100px; margin: 3rem auto; padding: 0 5% 6rem; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: rgba(44,55,118,0.1); border: 1px solid rgba(44,55,118,0.1); }
        .grid-card { background: white; cursor: pointer; display: flex; flex-direction: column; transition: 0.2s; position: relative; overflow: hidden; }
        .grid-card:hover { box-shadow: 0 0 0 2px var(--navy) inset; z-index: 1; }
        .grid-card-img-wrap { width: 100%; aspect-ratio: 1/1; overflow: hidden; position: relative; }
        .grid-card-img-wrap img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); transition: transform 0.35s; }
        .grid-card:hover .grid-card-img-wrap img { transform: translate(-50%, -50%) scale(0.9); }
        .grid-card-info { padding: 1.5rem; border-top: 1px solid rgba(44,55,118,0.05); text-align: center; }
        .grid-card-name { font-family: 'Uncial Antiqua', serif; font-size: 0.85rem; }
        .grid-card-price { font-size: 0.7rem; color: var(--or); margin-top: 8px; }

        /* FOOTER */
        footer { background: var(--navy); color: var(--bg); padding: 64px 5% 40px; }
        .footer-inner { max-width: 860px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 48px; }
        .footer-col-title { font-size: 0.52rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--or); margin-bottom: 25px; display: block; }
        .footer-links { list-style: none; display: flex; flex-direction: column; gap: 12px; }
        .footer-links li a { color: var(--bg); text-decoration: none; display: flex; flex-direction: column; gap: 2px; transition: opacity 0.2s; }
        .footer-links li a:hover { opacity: 0.7; }
        .footer-links li a .fl-label { font-size: 0.46rem; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.5; color: var(--bg); }
        .footer-links li a .fl-name { font-size: 0.62rem; letter-spacing: 0.05em; color: var(--bg); }
        .footer-contact-text { font-size: 0.6rem; opacity: 0.5; line-height: 1.8; margin-bottom: 16px; color: var(--bg); }
        .footer-email { color: var(--or); text-decoration: none; font-size: 0.65rem; letter-spacing: 0.06em; font-weight: 500; }
        .footer-bottom { max-width: 860px; margin: 48px auto 0; padding-top: 20px; border-top: 1px solid rgba(248,242,231,0.1); display: flex; justify-content: space-between; align-items: center; }
        .footer-bottom span { font-size: 0.5rem; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.35; }

        .tab-bar { display: none; }

        @media (max-width: 768px) {
            header { justify-content: center; }
            .main-nav { display: none; }
            #shop-curtain { top: 64px; bottom: 60px; } /* Ajusté pour laisser header et nav mobile */
            .grid { grid-template-columns: repeat(2, 1fr) !important; }
            .footer-inner { grid-template-columns: 1fr; gap: 36px; }
