<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verso L'Alto — Boutique Tradiscout</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Sanchez&family=Uncial+Antiqua&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── VARIABLES DE TON MAIN.CSS ─── */
    :root {
      --bg:     #e2e5b3; /* Ton beige */
      --navy:   #0a1d37; /* Ton marine */
      --overlay: rgba(226, 229, 179, 0.7);
    }

    /* ─── RESET & BASE ─── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background-color: var(--bg);
      background-image: linear-gradient(var(--overlay), var(--overlay)), url('IMG_5189.jpeg');
      background-size: cover;
      background-attachment: fixed;
      color: var(--navy);
      font-family: 'Sanchez', serif;
      line-height: 1.6;
    }

    /* ─── HEADER ─── */
    header {
      padding: 2rem;
      text-align: center;
      border-bottom: 1px solid rgba(10, 29, 55, 0.1);
    }
    .logo {
      font-family: 'Uncial Antiqua', cursive;
      font-size: 2.5rem;
      text-transform: lowercase;
      letter-spacing: -1px;
    }
    .logo span { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.8rem; }

    /* ─── BOUTON PANIER FLOTTANT ─── */
    .cart-trigger {
      position: fixed;
      top: 2rem;
      right: 2rem;
      background: var(--navy);
      color: var(--bg);
      border: none;
      padding: 0.8rem 1.2rem;
      font-family: 'Uncial Antiqua';
      cursor: pointer;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cart-count { background: var(--bg); color: var(--navy); padding: 2px 8px; border-radius: 20px; font-size: 0.8rem; }

    /* ─── LAYOUT ─── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 4rem 2rem;
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 4rem;
    }

    .hero-text { grid-column: 1 / -1; text-align: center; margin-bottom: 2rem; }
    .hero-text h1 { font-family: 'Uncial Antiqua'; font-size: 3rem; margin-bottom: 1rem; }

    /* ─── VISUEL PRODUIT ─── */
    .preview-sticky { position: sticky; top: 2rem; }
    .garment-visual {
      aspect-ratio: 3/4;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .garment-visual.marine { background: var(--navy); color: var(--bg); }
    .garment-visual.blanc { background: #fffcf0; }

    .garment-shape { width: 65%; transition: all 0.3s; }
    .garment-path { stroke: var(--navy); stroke-width: 1.5; fill: transparent; }
    .garment-visual.marine .garment-path { stroke: var(--bg); }

    .design-on-garment {
      position: absolute;
      bottom: 22%;
      width: 60%;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
      line-height: 1.3;
    }

    .price-tag {
      position: absolute;
      top: 20px;
      right: 20px;
      font-family: 'Uncial Antiqua';
      font-size: 2rem;
    }

    /* ─── CONFIGURATION ─── */
    .config-panel { display: flex; flex-direction: column; gap: 2rem; }
    .section-title {
      font-family: 'Uncial Antiqua';
      font-size: 0.9rem;
      border-bottom: 1px solid var(--navy);
      padding-bottom: 5px;
      margin-bottom: 15px;
    }

    .grid-btns { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; }
    
    button.opt {
      background: rgba(10, 29, 55, 0.05);
      border: 1px solid var(--navy);
      color: var(--navy);
      padding: 12px;
      font-family: 'Sanchez';
      cursor: pointer;
      transition: 0.3s;
    }
    button.opt.active { background: var(--navy); color: var(--bg); }
    button.opt:hover:not(.active) { background: rgba(10, 29, 55, 0.1); }

    .design-btn { font-size: 0.8rem; line-height: 1.4; }

    .add-to-cart-btn {
      width: 100%;
      padding: 20px;
      background: var(--navy);
      color: var(--bg);
      border: none;
      font-family: 'Uncial Antiqua';
      font-size: 1.2rem;
      cursor: pointer;
      margin-top: 20px;
    }
    .add-to-cart-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ─── PANIER (DRAWER) ─── */
    .drawer {
      position: fixed; top: 0; right: 0; width: 400px; height: 100%;
      background: var(--bg); border-left: 2px solid var(--navy);
      z-index: 200; transform: translateX(100%); transition: 0.4s;
      padding: 2rem; display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      visibility: hidden; opacity: 0; transition: 0.3s; z-index: 199;
    }
    .overlay.open { visibility: visible; opacity: 1; }

    @media (max-width: 850px) {
      .container { grid-template-columns: 1fr; }
      .cart-trigger { top: auto; bottom: 20px; right: 20px; }
    }
  </style>
</head>
<body>

  <button class="cart-trigger" onclick="toggleCart()">
    Panier <span class="cart-count" id="cartCount">0</span>
  </button>

  <header>
    <div class="logo">Verso <span>L'Alto</span></div>
  </header>

  <main class="container">
    <div class="hero-text">
      <h1>La boutique <em>scout</em>.</h1>
      <p>Personnalise ton équipement Tradiscout.</p>
    </div>

    <div class="preview-sticky">
      <div class="garment-visual" id="visual">
        <div class="price-tag" id="priceLabel">17 €</div>
        <div class="garment-shape" id="svgContainer"></div>
        <div class="design-on-garment" id="designPreview">Choisis une citation</div>
      </div>
    </div>

    <div class="config-panel">
      
      <div>
        <div class="section-title">01. Article</div>
        <div class="grid-btns">
          <button class="opt active" onclick="set('type', 'tshirt', 17, this)">T-Shirt</button>
          <button class="opt" onclick="set('type', 'sweat', 33, this)">Sweat</button>
          <button class="opt" onclick="set('type', 'hoodie', 37, this)">Hoodie</button>
        </div>
      </div>

      <div>
        <div class="section-title">02. Taille</div>
        <div class="grid-btns">
          <button class="opt" onclick="set('size', 'S', null, this)">S</button>
          <button class="opt" onclick="set('size', 'M', null, this)">M</button>
          <button class="opt" onclick="set('size', 'L', null, this)">L</button>
          <button class="opt" onclick="set('size', 'XL', null, this)">XL</button>
        </div>
      </div>

      <div>
        <div class="section-title">03. Couleur</div>
        <div class="grid-btns">
          <button class="opt" onclick="set('color', 'blanc', null, this)">Coton</button>
          <button class="opt" onclick="set('color', 'marine', null, this)">Marine</button>
        </div>
      </div>

      <div>
        <div class="section-title">04. Citation</div>
        <div class="grid-btns" style="grid-template-columns: 1fr;">
          <button class="opt design-btn" onclick="set('design', '1', null, this)">« Laisse Dieu agir, et agis avec Dieu. »</button>
          <button class="opt design-btn" onclick="set('design', '2', null, this)">« Toujours prêt, toujours debout. »</button>
          <button class="opt design-btn" onclick="set('design', '3', null, this)">« Per aspera ad astra. »</button>
        </div>
      </div>

      <button class="add-to-cart-btn" id="addBtn" disabled onclick="add()">Ajouter au panier</button>
    </div>
  </main>

  <div class="overlay" id="overlay" onclick="toggleCart()"></div>
  <div class="drawer" id="drawer">
    <h2 style="font-family: 'Uncial Antiqua'; margin-bottom: 2rem;">Ton Panier</h2>
    <div id="cartList" style="flex:1">
      <p style="opacity: 0.5;">Le panier est vide.</p>
    </div>
    <div style="border-top: 1px solid var(--navy); padding-top: 1rem;">
      <div style="display:flex; justify-content: space-between; font-family: 'Uncial Antiqua'; font-size: 1.5rem;">
        <span>Total</span><span id="totalLabel">0 €</span>
      </div>
      <button class="add-to-cart-btn" style="background: var(--navy);">Passer au paiement</button>
    </div>
  </div>

  <script>
    const state = { type: 'tshirt', size: '', color: '', design: '', price: 17 };
    let cart = [];

    const SVGS = {
      tshirt: `<svg viewBox="0 0 200 220"><path class="garment-path" d="M60 20 L20 60 L50 75 L50 200 L150 200 L150 75 L180 60 L140 20 L115 40 C110 50 90 50 85 40 Z"/></svg>`,
      sweat: `<svg viewBox="0 0 200 230"><path class="garment-path" d="M60 25 L15 70 L45 82 L45 210 L155 210 L155 82 L185 70 L140 25 L118 45 C113 56 87 56 82 45 Z"/></svg>`,
      hoodie: `<svg viewBox="0 0 200 240"><path class="garment-path" d="M60 30 L15 75 L45 88 L45 215 L155 215 L155 88 L185 75 L140 30 C130 20 115 15 100 15 C85 15 70 20 60 30 Z"/></svg>`
    };

    function set(key, val, price, btn) {
      state[key] = val;
      if(price) state.price = price;
      
      // Update UI buttons
      btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // Update Visual
      document.getElementById('svgContainer').innerHTML = SVGS[state.type] || '';
      document.getElementById('visual').className = 'garment-visual ' + state.color;
      document.getElementById('designPreview').innerText = state.design ? document.querySelector('.opt.active.design-btn').innerText : 'Choisis une citation';
      document.getElementById('priceLabel').innerText = state.price + ' €';

      // Validation
      document.getElementById('addBtn').disabled = !(state.type && state.size && state.color && state.design);
    }

    function add() {
      cart.push({...state});
      updateCartUI();
      toggleCart();
    }

    function toggleCart() {
      document.getElementById('drawer').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('open');
    }

    function updateCartUI() {
      document.getElementById('cartCount').innerText = cart.length;
      const total = cart.reduce((acc, item) => acc + item.price, 0);
      document.getElementById('totalLabel').innerText = total + ' €';
      
      const list = document.getElementById('cartList');
      if(cart.length === 0) {
        list.innerHTML = '<p>Panier vide.</p>';
      } else {
        list.innerHTML = cart.map((item, index) => `
          <div style="margin-bottom:15px; border-bottom:1px solid rgba(10,29,55,0.1); padding-bottom:10px">
            <strong>${item.type.toUpperCase()}</strong> (${item.size}) - ${item.price}€<br>
            <small>${item.color} / Design sélectionné</small>
          </div>
        `).join('');
      }
    }

    // Init
    document.getElementById('svgContainer').innerHTML = SVGS.tshirt;
  </script>
</body>
</html>
