<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verso L'Alto — Boutique</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
  :root {
  --bg-color: #e2e5b3;
  --navy: #0a1d37;
  --overlay-yellow: rgba(226, 229, 179, 0.6);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background-image: 
    linear-gradient(var(--overlay-yellow), var(--overlay-yellow)),
    url('IMG_5189.jpeg');
  background-size: 100% auto;
  background-position: center center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  background-color: var(--bg-color);
  color: var(--navy);
  font-family: 'Sanchez', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
header {
  padding: 2rem 3rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(10, 29, 55, 0.15);
  position: sticky;
  top: 0;
  background: rgba(226, 229, 179, 0.95);
  backdrop-filter: blur(8px);
  z-index: 50;
}

.logo {
  font-family: 'Uncial Antiqua', cursive;
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--navy);
  text-transform: uppercase;
}

/* PANIER BOUTON */
.cart-btn {
  background: transparent;
  border: 1px solid rgba(10, 29, 55, 0.3);
  color: var(--navy);
  font-family: 'Sanchez', serif;
  font-size: 0.95rem;
  letter-spacing: 0.1em;
  padding: 0.6rem 1rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.cart-btn:hover {
  border-color: var(--navy);
  color: var(--navy);
  background: rgba(10, 29, 55, 0.05);
}

.cart-count {
  background: var(--navy);
  color: var(--bg-color);
  border-radius: 50%;
  width: 18px;
  height: 18px;
  font-size: 0.55rem;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 500;
}

/* HERO */
.hero {
  padding: 4rem 3rem 2rem;
}

.hero h1 {
  font-family: 'Uncial Antiqua', cursive;
  font-size: clamp(2.5rem, 7vw, 6rem);
  font-weight: 400;
  line-height: 0.9;
  color: var(--navy);
}

.hero h1 em {
  font-style: italic;
  color: var(--navy);
}

.hero p {
  margin-top: 1rem;
  font-size: 0.9rem;
  letter-spacing: 0.08em;
  color: var(--navy);
  text-transform: capitalize;
}

/* SHOP LAYOUT */
.shop {
  padding: 2rem 3rem 4rem;
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 4rem;
  max-width: 1200px;
  margin: 0 auto;
}

/* PREVIEW */
.preview-zone {
  position: sticky;
  top: 5rem;
  height: fit-content;
}

.garment-visual {
  aspect-ratio: 3/4;
  border: 1px solid rgba(10, 29, 55, 0.2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  position: relative;
  overflow: hidden;
  background: #f9f7f0;
  transition: background 0.4s ease;
}

.garment-visual.blanc { background: #f5f2eb; }
.garment-visual.marine { background: #e2e5b3; }

.garment-shape { width: 55%; transition: all 0.3s ease; }
.garment-shape svg { width: 100%; height: auto; }

.shape-fill-blanc .garment-path { fill: #f5f2eb; stroke: #ccc; }
.shape-fill-marine .garment-path { fill: #e2e5b3; stroke: #d4d8a0; }

.design-preview {
  position: absolute;
  bottom: 18%;
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
  text-align: center;
  font-family: 'Sanchez', serif;
  font-style: italic;
  font-size: 0.9rem;
  line-height: 1.5;
  letter-spacing: 0.05em;
  opacity: 0.85;
  transition: all 0.4s ease;
  color: var(--navy);
}

.garment-visual.blanc .design-preview { color: var(--navy); }
.garment-visual.marine .design-preview { color: var(--navy); }

.garment-label {
  position: absolute;
  bottom: 1.2rem;
  left: 1.2rem;
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--navy);
  font-weight: 600;
}

.price-display {
  position: absolute;
  top: 1.2rem;
  right: 1.2rem;
  font-family: 'Sanchez', serif;
  font-size: 2rem;
  font-weight: 600;
  color: var(--navy);
}

/* CONFIG PANEL */
.config-panel { display: flex; flex-direction: column; gap: 2rem; }

.config-section { display: flex; flex-direction: column; gap: 0.7rem; }

.config-label {
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--navy);
  padding-bottom: 0.4rem;
  border-bottom: 1px solid rgba(10, 29, 55, 0.15);
  font-weight: 600;
}

.options-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }

.opt-btn, .size-btn, .color-btn, .design-btn {
  background: transparent;
  border: 1px solid rgba(10, 29, 55, 0.2);
  color: var(--navy);
  font-family: 'Sanchez', serif;
  cursor: pointer;
  transition: all 0.2s ease;
}

.opt-btn {
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.8rem 0.4rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3rem;
}

.opt-btn .opt-price { font-size: 0.7rem; color: var(--navy); opacity: 0.7; }

.sizes-row, .colors-row { display: flex; gap: 0.5rem; }

.size-btn { flex: 1; font-size: 0.9rem; letter-spacing: 0.08em; padding: 0.7rem; }

.color-btn {
  flex: 1;
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.8rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.color-dot.blanc { background: #f5f2eb; border: 1px solid #ccc; }
.color-dot.marine { background: #e2e5b3; border: 1px solid #d4d8a0; }

.designs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }

.design-btn {
  font-family: 'Sanchez', serif;
  font-style: italic;
  font-size: 0.85rem;
  line-height: 1.5;
  padding: 0.9rem 0.8rem;
  text-align: center;
}

.design-btn .design-num {
  display: block;
  font-family: 'Sanchez', serif;
  font-style: normal;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: var(--navy);
  margin-bottom: 0.4rem;
  text-transform: uppercase;
  font-weight: 600;
}

.opt-btn:hover, .size-btn:hover, .color-btn:hover, .design-btn:hover {
  border-color: rgba(10, 29, 55, 0.4);
  background: rgba(10, 29, 55, 0.05);
}

.opt-btn.selected, .size-btn.selected, .color-btn.selected, .design-btn.selected {
  border-color: var(--navy);
  background: rgba(10, 29, 55, 0.1);
  color: var(--navy);
  font-weight: 600;
}

/* BOUTON AJOUTER AU PANIER */
.add-btn {
  width: 100%;
  padding: 1rem;
  background: transparent;
  border: 1px solid var(--navy);
  color: var(--navy);
  font-family: 'Sanchez', serif;
  font-size: 0.95rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.25s ease;
  font-weight: 600;
}

.add-btn:hover {
  background: var(--navy);
  color: var(--bg-color);
}

.add-btn:disabled {
  border-color: #ccc;
  color: #999;
  cursor: not-allowed;
}

.add-btn:disabled:hover { background: transparent; color: #999; }

.missing-msg {
  font-size: 0.75rem;
  color: var(--navy);
  letter-spacing: 0.08em;
  text-align: center;
  margin-top: 0.4rem;
  min-height: 1rem;
  opacity: 0.6;
}

/* ═══ DRAWER PANIER ═══ */
.cart-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.3);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.cart-overlay.open { opacity: 1; pointer-events: all; }

.cart-drawer {
  position: fixed;
  top: 0;
  right: 0;
  width: 420px;
  max-width: 100vw;
  height: 100vh;
  background: var(--bg-color);
  border-left: 1px solid rgba(10, 29, 55, 0.15);
  z-index: 201;
  transform: translateX(100%);
  transition: transform 0.35s ease;
  display: flex;
  flex-direction: column;
}

.cart-drawer.open { transform: translateX(0); }

.cart-header {
  padding: 1.5rem;
  border-bottom: 1px solid rgba(10, 29, 55, 0.15);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.cart-title {
  font-family: 'Uncial Antiqua', cursive;
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--navy);
}

.cart-close {
  background: transparent;
  border: none;
  color: var(--navy);
  font-size: 1.2rem;
  cursor: pointer;
  padding: 0.3rem;
  transition: color 0.2s;
}

.cart-close:hover { color: var(--navy); opacity: 0.7; }

.cart-items {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}

.cart-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  font-size: 0.9rem;
  color: var(--navy);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.5;
}

.cart-item {
  border: 1px solid rgba(10, 29, 55, 0.15);
  padding: 1rem;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 0.5rem;
  align-items: start;
  animation: slideIn 0.25s ease both;
  background: rgba(10, 29, 55, 0.03);
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(10px); }
  to { opacity: 1; transform: translateX(0); }
}

.item-name {
  font-family: 'Sanchez', serif;
  font-size: 1rem;
  font-weight: 600;
  color: var(--navy);
}

.item-details {
  font-size: 0.8rem;
  color: var(--navy);
  letter-spacing: 0.05em;
  margin-top: 0.2rem;
  line-height: 1.7;
  opacity: 0.7;
}

.item-price {
  font-family: 'Sanchez', serif;
  font-size: 1.1rem;
  color: var(--navy);
  font-weight: 600;
}

.item-remove {
  background: transparent;
  border: none;
  color: var(--navy);
  font-size: 0.75rem;
  cursor: pointer;
  transition: color 0.2s;
  padding: 0;
  display: block;
  text-align: right;
  margin-top: 0.3rem;
  opacity: 0.5;
}

.item-remove:hover { opacity: 1; }

.cart-footer {
  padding: 1.5rem;
  border-top: 1px solid rgba(10, 29, 55, 0.15);
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.cart-total-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.cart-total-label {
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--navy);
  opacity: 0.6;
}

.cart-total-amount {
  font-family: 'Sanchez', serif;
  font-size: 2rem;
  font-weight: 600;
  color: var(--navy);
}

.checkout-btn {
  width: 100%;
  padding: 1.1rem;
  background: var(--navy);
  color: var(--bg-color);
  border: none;
  font-family: 'Sanchez', serif;
  font-size: 0.95rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.25s ease;
  font-weight: 600;
}

.checkout-btn:hover { background: rgba(10, 29, 55, 0.85); }
.checkout-btn:disabled { background: #ccc; color: #999; cursor: not-allowed; }

.checkout-loading { display: none; }
.checkout-btn.loading .checkout-text { display: none; }
.checkout-btn.loading .checkout-loading { display: inline; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--navy);
  color: var(--bg-color);
  font-family: 'Sanchez', serif;
  font-size: 0.9rem;
  letter-spacing: 0.08em;
  padding: 0.7rem 1.4rem;
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 300;
  pointer-events: none;
  white-space: nowrap;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

footer {
  text-align: center;
  padding: 2rem;
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  color: var(--navy);
  text-transform: uppercase;
  border-top: 1px solid rgba(10, 29, 55, 0.1);
  opacity: 0.6;
}

@media (max-width: 900px) {
  .shop { grid-template-columns: 1fr; }
  .preview-zone { position: static; }
  .garment-visual { aspect-ratio: 4/3; }
  header, .hero, .shop { padding-left: 1.5rem; padding-right: 1.5rem; }
  .cart-drawer { width: 100vw; }
}
  </style>
</head>
<body>

<header>
  <div class="logo">Verso <span>L'Alto</span></div>
  <button class="cart-btn" onclick="openCart()">
    Panier
    <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<section class="hero">
  <h1>La <em>boutique</em><br>scout.</h1>
  <p>Configurez votre article puis ajoutez-le au panier.</p>
</section>

<main class="shop">

  <!-- PREVIEW -->
  <div class="preview-zone">
    <div class="garment-visual" id="garmentVisual">
      <div class="garment-shape" id="garmentShape"></div>
      <div class="design-preview" id="designPreview">Sélectionnez<br>un design</div>
      <div class="garment-label" id="garmentLabel">—</div>
      <div class="price-display" id="priceDisplay">—</div>
    </div>
  </div>

  <!-- CONFIG -->
  <div class="config-panel">

    <div class="config-section">
      <div class="config-label">01 — Vêtement</div>
      <div class="options-grid">
        <button class="opt-btn" data-type="tshirt" data-price="17" onclick="selectOption('type', this)">
          T-Shirt<span class="opt-price">17 €</span>
        </button>
        <button class="opt-btn" data-type="sweat" data-price="33" onclick="selectOption('type', this)">
          Sweat<span class="opt-price">33 €</span>
        </button>
        <button class="opt-btn" data-type="hoodie" data-price="37" onclick="selectOption('type', this)">
          Hoodie<span class="opt-price">37 €</span>
        </button>
      </div>
    </div>

    <div class="config-section">
      <div class="config-label">02 — Taille</div>
      <div class="sizes-row">
        <button class="size-btn" onclick="selectOption('size', this)" data-size="S">S</button>
        <button class="size-btn" onclick="selectOption('size', this)" data-size="M">M</button>
        <button class="size-btn" onclick="selectOption('size', this)" data-size="L">L</button>
      </div>
    </div>

    <div class="config-section">
      <div class="config-label">03 — Couleur</div>
      <div class="colors-row">
        <button class="color-btn" onclick="selectOption('color', this)" data-color="blanc">
          <span class="color-dot blanc"></span>Blanc
        </button>
        <button class="color-btn" onclick="selectOption('color', this)" data-color="marine">
          <span class="color-dot marine"></span>Marine
        </button>
      </div>
    </div>

    <div class="config-section">
      <div class="config-label">04 — Citation</div>
      <div class="designs-grid">
        <button class="design-btn" onclick="selectOption('design', this)" data-design="1">
          <span class="design-num">Design 01</span>
          « Laisse Dieu agir,<br>et agis avec Dieu. »
        </button>
        <button class="design-btn" onclick="selectOption('design', this)" data-design="2">
          <span class="design-num">Design 02</span>
          « Toujours prêt,<br>toujours debout. »
        </button>
        <button class="design-btn" onclick="selectOption('design', this)" data-design="3">
          <span class="design-num">Design 03</span>
          « Per aspera<br>ad astra. »
        </button>
        <button class="design-btn" onclick="selectOption('design', this)" data-design="4">
          <span class="design-num">Design 04</span>
          « Verso l'Alto —<br>toujours plus haut. »
        </button>
      </div>
    </div>

    <div>
      <button class="add-btn" id="addBtn" disabled onclick="addToCart()">
        + Ajouter au panier
      </button>
      <div class="missing-msg" id="missingMsg">Complétez tous les choix</div>
    </div>

  </div>
</main>

<!-- DRAWER PANIER -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <div class="cart-title">Mon panier</div>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty">Panier vide</div>
  </div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-amount" id="cartTotal">0 €</span>
    </div>
    <button class="checkout-btn" id="checkoutBtn" disabled onclick="goToCheckout()">
      <span class="checkout-text">Payer →</span>
      <span class="checkout-loading">Redirection...</span>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>© 2026 Verso L'Alto — Tradiscout · Paiement sécurisé par Stripe</footer>

<script>
  // ─── ÉTAT ────────────────────────────────────────────────────────────
  const state = { type: null, size: null, color: null, design: null, price: null };
  let cart = [];

  const DESIGNS = {
    '1': "« Laisse Dieu agir,\net agis avec Dieu. »",
    '2': "« Toujours prêt,\ntoujours debout. »",
    '3': "« Per aspera\nad astra. »",
    '4': "« Verso l'Alto —\ntoujours plus haut. »"
  };
  const DESIGN_SHORT = {
    '1': 'Laisse Dieu agir...',
    '2': 'Toujours prêt...',
    '3': 'Per aspera ad astra',
    '4': "Verso l'Alto"
  };
  const LABELS = { tshirt: 'T-Shirt', sweat: 'Sweat', hoodie: 'Hoodie' };

  const SVG_TSHIRT = `<svg viewBox="0 0 200 220" fill="none" xmlns="http://www.w3.org/2000/svg"><path class="garment-path" d="M60 20 L20 60 L50 75 L50 200 L150 200 L150 75 L180 60 L140 20 L115 40 C110 50 90 50 85 40 Z" stroke-width="1.5"/></svg>`;
  const SVG_SWEAT = `<svg viewBox="0 0 200 230" fill="none" xmlns="http://www.w3.org/2000/svg"><path class="garment-path" d="M60 25 L15 70 L45 82 L45 210 L155 210 L155 82 L185 70 L140 25 L118 45 C113 56 87 56 82 45 Z" stroke-width="1.5"/><path class="garment-path" d="M45 210 L45 220 L65 220 L65 210" stroke-width="1"/><path class="garment-path" d="M155 210 L155 220 L135 220 L135 210" stroke-width="1"/></svg>`;
  const SVG_HOODIE = `<svg viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg"><path class="garment-path" d="M60 30 L15 75 L45 88 L45 215 L155 215 L155 88 L185 75 L140 30 C130 20 115 15 100 15 C85 15 70 20 60 30 Z" stroke-width="1.5"/><path class="garment-path" d="M85 30 Q100 55 115 30" stroke-width="1" fill="none"/><path class="garment-path" d="M80 215 L80 230 L120 230 L120 215" stroke-width="1"/><path class="garment-path" d="M45 215 L45 225 L65 225 L65 215" stroke-width="1"/><path class="garment-path" d="M155 215 L155 225 L135 225 L135 215" stroke-width="1"/></svg>`;
  const SVGS = { tshirt: SVG_TSHIRT, sweat: SVG_SWEAT, hoodie: SVG_HOODIE };

  // ─── SÉLECTION ───────────────────────────────────────────────────────
  function selectOption(category, btn) {
    btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    if (category === 'type') { state.type = btn.dataset.type; state.price = parseInt(btn.dataset.price); }
    else if (category === 'size') state.size = btn.dataset.size;
    else if (category === 'color') state.color = btn.dataset.color;
    else if (category === 'design') state.design = btn.dataset.design;
    updatePreview();
    updateCTA();
  }

  function updatePreview() {
    const visual = document.getElementById('garmentVisual');
    const shape = document.getElementById('garmentShape');
    const designPrev = document.getElementById('designPreview');
    const label = document.getElementById('garmentLabel');
    const priceDisp = document.getElementById('priceDisplay');

    visual.className = 'garment-visual' + (state.color ? ' ' + state.color : '');
    if (state.type) {
      shape.innerHTML = SVGS[state.type];
      shape.className = 'garment-shape' + (state.color ? ' shape-fill-' + state.color : '');
      label.textContent = LABELS[state.type];
      priceDisp.textContent = state.price + ' €';
    } else {
      label.textContent = '—';
      priceDisp.textContent = '—';
    }
    designPrev.innerHTML = state.design ? DESIGNS[state.design].replace('\n', '<br>') : 'Sélectionnez<br>un design';
  }

  function updateCTA() {
    const btn = document.getElementById('addBtn');
    const msg = document.getElementById('missingMsg');
    const ok = state.type && state.size && state.color && state.design;
    btn.disabled = !ok;
    if (ok) {
      msg.textContent = '';
    } else {
      const missing = ['type','size','color','design'].filter(k => !state[k]);
      const labels = { type: 'vêtement', size: 'taille', color: 'couleur', design: 'design' };
      msg.textContent = 'Manque : ' + missing.map(k => labels[k]).join(', ');
    }
  }

  // ─── PANIER ──────────────────────────────────────────────────────────
  function addToCart() {
    const item = {
      id: Date.now(),
      type: state.type,
      size: state.size,
      color: state.color,
      design: state.design,
      price: state.price,
      label: LABELS[state.type],
      designShort: DESIGN_SHORT[state.design]
    };
    cart.push(item);
    renderCart();
    showToast(`${item.label} ajouté au panier`);
  }

  function removeFromCart(id) {
    cart = cart.filter(i => i.id !== id);
    renderCart();
  }

  function renderCart() {
    const container = document.getElementById('cartItems');
    const total = cart.reduce((s, i) => s + i.price, 0);

    document.getElementById('cartCount').textContent = cart.length;
    document.getElementById('cartTotal').textContent = total + ' €';
    document.getElementById('checkoutBtn').disabled = cart.length === 0;

    if (cart.length === 0) {
      container.innerHTML = '<div class="cart-empty">Panier vide</div>';
      return;
    }

    container.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div>
          <div class="item-name">${item.label}</div>
          <div class="item-details">
            Taille : ${item.size}<br>
            Couleur : ${item.color.charAt(0).toUpperCase() + item.color.slice(1)}<br>
            Design : ${item.designShort}
          </div>
        </div>
        <div>
          <div class="item-price">${item.price} €</div>
          <button class="item-remove" onclick="removeFromCart(${item.id})">✕ retirer</button>
        </div>
      </div>
    `).join('');
  }

  function openCart() {
    document.getElementById('cartOverlay').classList.add('open');
    document.getElementById('cartDrawer').classList.add('open');
  }
  function closeCart() {
    document.getElementById('cartOverlay').classList.remove('open');
    document.getElementById('cartDrawer').classList.remove('open');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ─── CHECKOUT ────────────────────────────────────────────────────────
  async function goToCheckout() {
    if (cart.length === 0) return;
    const btn = document.getElementById('checkoutBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res = await fetch('/api/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items: cart })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Erreur serveur');
      }

      const { url } = await res.json();
      window.location.href = url;
    } catch (e) {
      alert('Erreur : ' + e.message);
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
