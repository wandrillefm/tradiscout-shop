<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boutique Tradiscout</title>
  <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="Tradiscout.jpg">
  <style>
    :root {
      --navy: #2C3776;   /* Ton bleu */
      --bg: #F8F2E7;     /* Ton beige */
      --or: #c9a84c;
      --gris: #6b6b6b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--navy);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(44, 55, 118, 0.1);
      position: sticky;
      top: 0;
      background: rgba(248, 242, 231, 0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
    }
    .logo {
      font-family: 'Uncial Antiqua', serif;
      font-size: 1.6rem;
      color: var(--navy);
      text-transform: lowercase;
    }

    .cart-btn {
      background: var(--navy);
      border: none;
      color: var(--bg);
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
    }
    .cart-count { background: var(--or); color: white; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; }

    /* LAYOUT */
    .shop-layout {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 3rem;
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem;
    }

    /* GALERIE GAUCHE */
    .product-gallery {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .product-img-card {
      background: white;
      border: 1px solid rgba(44, 55, 118, 0.1);
      padding: 10px;
      cursor: pointer;
      transition: 0.3s;
      text-align: center;
    }
    .product-img-card:hover, .product-img-card.selected {
      border-color: var(--navy);
      box-shadow: 0 4px 15px rgba(44, 55, 118, 0.1);
    }
    .product-img-card img { width: 100%; height: auto; display: block; margin-bottom: 10px; }
    .product-img-card h3 { font-family: 'Uncial Antiqua', serif; font-size: 0.9rem; }

    /* CONFIG DROITE */
    .config-panel { position: sticky; top: 7rem; height: fit-content; }
    .config-title { font-family: 'Uncial Antiqua', serif; font-size: 2.2rem; margin-bottom: 1rem; }
    
    .config-section { margin-bottom: 2rem; }
    .config-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gris);
      margin-bottom: 0.8rem;
      display: block;
      border-bottom: 1px solid rgba(44, 55, 118, 0.1);
    }

    .options-grid { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .opt-btn {
      border: 1px solid rgba(44, 55, 118, 0.2);
      background: transparent;
      padding: 0.7rem 1rem;
      cursor: pointer;
      color: var(--navy);
      font-family: inherit;
    }
    .opt-btn.selected { background: var(--navy); color: white; border-color: var(--navy); }

    .add-btn {
      width: 100%;
      padding: 1.2rem;
      background: var(--navy);
      color: white;
      border: none;
      font-family: 'Uncial Antiqua', serif;
      font-size: 1.1rem;
      cursor: pointer;
      margin-top: 1rem;
    }
    .add-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .missing-msg { font-size: 0.6rem; color: var(--gris); text-align: center; margin-top: 10px; }

    /* PANIER DRAWER */
    .cart-drawer {
      position: fixed; top: 0; right: 0; width: 400px; height: 100%;
      background: white; z-index: 200; transform: translateX(100%);
      transition: 0.3s; padding: 2rem; display: flex; flex-direction: column;
      border-left: 1px solid var(--navy);
    }
    .cart-drawer.open { transform: translateX(0); }
    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 150; }

    @media (max-width: 900px) { .shop-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <div class="logo">tradiscout</div>
  <button class="cart-btn" onclick="openCart()">
    Panier <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<main class="shop-layout">
  <div class="product-gallery">
    <div class="product-img-card" onclick="selectType('tshirt', 17, this)">
      <img src="Groupe 26.png" alt="T-shirt">
      <img src="Groupe 27.png" alt="T-shirt">
      <img src="Groupe 31.png" alt="T-shirt">
      <img src="Groupe 33.png" alt="T-shirt">
      <h3>T-Shirt — 17€</h3>
    </div>
    <div class="product-img-card" onclick="selectType('sweat', 33, this)">
      <img src="FINAL.png" alt="Sweat">
      <h3>Sweat — 33€</h3>
    </div>
    <div class="product-img-card" onclick="selectType('hoodie', 37, this)">
      <img src="FINAL.png" alt="Hoodie">
      <h3>Hoodie — 37€</h3>
    </div>
  </div>

  <div class="config-panel">
    <h1 class="config-title" id="displayTitle">Sélectionnez un article</h1>
    
    <div class="config-section">
      <span class="config-label">01 — Taille</span>
      <div class="options-grid" id="sizeGrid">
        <button class="opt-btn" onclick="selectOption('size', 'S', this)">S</button>
        <button class="opt-btn" onclick="selectOption('size', 'M', this)">M</button>
        <button class="opt-btn" onclick="selectOption('size', 'L', this)">L</button>
        <button class="opt-btn" onclick="selectOption('size', 'XL', this)">XL</button>
      </div>
    </div>

    <div class="config-section">
      <span class="config-label">02 — Couleur</span>
      <div class="options-grid">
        <button class="opt-btn" onclick="selectOption('color', 'blanc', this)">Blanc</button>
        <button class="opt-btn" onclick="selectOption('color', 'marine', this)">Marine</button>
      </div>
    </div>

    <div class="config-section">
      <span class="config-label">03 — Citation</span>
      <div class="options-grid">
        <button class="opt-btn" onclick="selectOption('design', '1', this)">Design 01</button>
        <button class="opt-btn" onclick="selectOption('design', '2', this)">Design 02</button>
        <button class="opt-btn" onclick="selectOption('design', '3', this)">Design 03</button>
        <button class="opt-btn" onclick="selectOption('design', '4', this)">Design 04</button>
      </div>
    </div>

    <button class="add-btn" id="addBtn" disabled onclick="addToCart()">+ Ajouter au panier</button>
    <div class="missing-msg" id="missingMsg">Complétez vos choix</div>
  </div>
</main>

<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <h2 style="font-family:'Uncial Antiqua'; margin-bottom:2rem">Mon Panier</h2>
  <div id="cartItems" style="flex:1; overflow-y:auto"></div>
  <div style="border-top:1px solid #eee; padding-top:1rem">
    <div style="display:flex; justify-content:space-between; margin-bottom:1rem; font-size:1.2rem">
      <span>Total</span><b id="cartTotal">0 €</b>
    </div>
    <button class="add-btn" id="checkoutBtn" onclick="goToCheckout()">Payer →</button>
  </div>
</div>

<script>
  // ─── ÉTAT (REPRIS EXACTEMENT DE TON CODE) ───
  const state = { type: null, size: null, color: null, design: null, price: null };
  let cart = [];

  const DESIGNS = {
    '1': "« Laisse Dieu agir,\net agis avec Dieu. »",
    '2': "« Toujours prêt,\ntoujours debout. »",
    '3': "« Per aspera\nad astra. »",
    '4': "« Verso l'Alto —\ntoujours plus haut. »"
  };
  const DESIGN_SHORT = {
    '1': 'Laisse Dieu agir...',
    '2': 'Toujours prêt...',
    '3': 'Per aspera ad astra',
    '4': "Verso l'Alto"
  };
  const LABELS = { tshirt: 'T-Shirt', sweat: 'Sweat', hoodie: 'Hoodie' };

  // ─── SÉLECTION ───
  function selectType(type, price, el) {
    state.type = type;
    state.price = price;
    document.querySelectorAll('.product-img-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('displayTitle').innerText = LABELS[type];
    updateCTA();
  }

  function selectOption(cat, val, el) {
    state[cat] = val;
    el.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    updateCTA();
  }

  function updateCTA() {
    const btn = document.getElementById('addBtn');
    const msg = document.getElementById('missingMsg');
    const ok = state.type && state.size && state.color && state.design;
    btn.disabled = !ok;
    msg.textContent = ok ? "" : "Sélectionnez tous les éléments";
  }

  // ─── PANIER (LOGIQUE ORIGINALE) ───
  function addToCart() {
    const item = {
      id: Date.now(),
      type: state.type,
      size: state.size,
      color: state.color,
      design: state.design,
      price: state.price,
      label: LABELS[state.type],
      designShort: DESIGN_SHORT[state.design]
    };
    cart.push(item);
    renderCart();
    openCart();
  }

  function renderCart() {
    const container = document.getElementById('cartItems');
    const total = cart.reduce((s, i) => s + i.price, 0);
    document.getElementById('cartCount').textContent = cart.length;
    document.getElementById('cartTotal').textContent = total + ' €';

    if (cart.length === 0) {
      container.innerHTML = '<p>Panier vide</p>';
      return;
    }
    container.innerHTML = cart.map(item => `
      <div style="margin-bottom:1rem; border-bottom:1px solid #eee; padding-bottom:10px">
        <div style="display:flex; justify-content:space-between"><b>${item.label}</b> <span>${item.price}€</span></div>
        <div style="font-size:0.7rem; color:gray">${item.size} / ${item.color} / ${item.designShort}</div>
      </div>
    `).join('');
  }

  function openCart() { 
    document.getElementById('cartDrawer').classList.add('open');
    document.getElementById('cartOverlay').style.display = 'block';
  }
  function closeCart() { 
    document.getElementById('cartDrawer').classList.remove('open');
    document.getElementById('cartOverlay').style.display = 'none';
  }

  // ─── CHECKOUT (REPRIS EXACTEMENT DE TON CODE) ───
  async function goToCheckout() {
    if (cart.length === 0) return;
    const btn = document.getElementById('checkoutBtn');
    btn.innerText = "Chargement...";
    btn.disabled = true;

    try {
      const res = await fetch('/api/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items: cart })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Erreur serveur');
      }

      const { url } = await res.json();
      window.location.href = url; // C'est ici que ça redirige vraiment
    } catch (e) {
      alert('Erreur : ' + e.message);
      btn.innerText = "Payer →";
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
