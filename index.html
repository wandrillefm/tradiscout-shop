<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boutique — Tradiscout</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Sanchez&family=Uncial+Antiqua&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #e2e5b3;
      --navy: #0a1d37;
      --white: #fffcf0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background-color: var(--bg);
      background-image: linear-gradient(rgba(226,229,179,0.7), rgba(226,229,179,0.7)), url('IMG_5189.jpeg');
      background-size: cover;
      background-attachment: fixed;
      color: var(--navy);
      font-family: 'Sanchez', serif;
      padding: 2rem;
    }

    header { text-align: center; margin-bottom: 3rem; }
    h1 { font-family: 'Uncial Antiqua'; font-size: 3rem; text-transform: lowercase; }

    /* ─── GRILLE PRODUITS ─── */
    .product-grid {
      display: grid;
      max-width: 1400px;
      margin: 0 auto;
      /* 6 par ligne sur PC */
      grid-template-columns: repeat(6, 1fr);
      gap: 20px;
    }

    .product-card {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid var(--navy);
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .product-card:hover { transform: translateY(-5px); }

    .product-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-bottom: 1px solid var(--navy);
      display: block;
    }

    .product-info { padding: 10px; text-align: center; }
    .product-info h3 { font-family: 'Uncial Antiqua'; font-size: 0.9rem; }
    .product-info p { font-size: 0.8rem; opacity: 0.8; }

    /* ─── LIGHTBOX (MODAL) ─── */
    .modal {
      position: fixed; inset: 0;
      background: rgba(10, 29, 55, 0.8);
      display: none; /* Caché par défaut */
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal.open { display: flex; }

    .modal-content {
      background: var(--bg);
      width: 100%;
      max-width: 900px;
      border: 2px solid var(--navy);
      display: grid;
      grid-template-columns: 1fr 1fr; /* Image à gauche, config à droite */
      position: relative;
    }

    .modal-close {
      position: absolute; top: 10px; right: 15px;
      font-size: 2rem; cursor: pointer; z-index: 10;
    }

    .modal-image-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .modal-config-side { padding: 30px; display: flex; flex-direction: column; gap: 20px; }
    .modal-config-side h2 { font-family: 'Uncial Antiqua'; }

    /* ─── SELECTEURS ─── */
    .selector-label { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-opt {
      padding: 8px 15px;
      border: 1px solid var(--navy);
      background: transparent;
      font-family: 'Sanchez';
      cursor: pointer;
    }
    .btn-opt.active { background: var(--navy); color: var(--bg); }

    .add-btn {
      margin-top: auto;
      padding: 15px;
      background: var(--navy);
      color: var(--bg);
      border: none;
      font-family: 'Uncial Antiqua';
      font-size: 1.1rem;
      cursor: pointer;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 1024px) {
      .product-grid { grid-template-columns: repeat(3, 1fr); } /* 3 par ligne sur tel/tablette */
    }

    @media (max-width: 768px) {
      .modal-content { grid-template-columns: 1fr; max-height: 90vh; overflow-y: auto; }
      .modal-image-side { aspect-ratio: 1/1; }
    }
  </style>
</head>
<body>

<header>
  <h1>la boutique</h1>
</header>

<div class="product-grid" id="grid">
  </div>

<div class="modal" id="modal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal()">×</span>
    <div class="modal-image-side">
      <img src="" id="modalImg" alt="Produit">
    </div>
    <div class="modal-config-side">
      <h2 id="modalTitle">Nom du produit</h2>
      <p id="modalPrice" style="font-size: 1.5rem; font-family: 'Uncial Antiqua';">00 €</p>
      
      <div>
        <p class="selector-label">Taille</p>
        <div class="btn-group">
          <button class="btn-opt" onclick="select(this)">S</button>
          <button class="btn-opt active" onclick="select(this)">M</button>
          <button class="btn-opt" onclick="select(this)">L</button>
          <button class="btn-opt" onclick="select(this)">XL</button>
        </div>
      </div>

      <div>
        <p class="selector-label">Couleur</p>
        <div class="btn-group">
          <button class="btn-opt active" onclick="select(this)">Marine</button>
          <button class="btn-opt" onclick="select(this)">Coton</button>
        </div>
      </div>

      <button class="add-btn" onclick="addToCart()">Ajouter au panier</button>
    </div>
  </div>
</div>

<script>
  // Liste de tes produits
  const products = [
    { id: 1, name: "T-Shirt Verso L'Alto", price: 17, img: "img1.jpg" },
    { id: 2, name: "Sweat Ad Astra", price: 33, img: "img2.jpg" },
    { id: 3, name: "Hoodie Scout", price: 37, img: "img3.jpg" },
    { id: 4, name: "T-Shirt Toujours Prêt", price: 17, img: "img4.jpg" },
    { id: 5, name: "Sweat Totus Tuus", price: 33, img: "img5.jpg" },
    { id: 6, name: "Veste de camp", price: 45, img: "img6.jpg" },
    // Ajoute autant de produits que tu veux, la grille suivra
  ];

  const grid = document.getElementById('grid');
  const modal = document.getElementById('modal');

  // Génération de la grille
  products.forEach(p => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.onclick = () => openModal(p);
    card.innerHTML = `
      <img src="${p.img}" class="product-img">
      <div class="product-info">
        <h3>${p.name}</h3>
        <p>${p.price} €</p>
      </div>
    `;
    grid.appendChild(card);
  });

  function openModal(p) {
    document.getElementById('modalImg').src = p.img;
    document.getElementById('modalTitle').innerText = p.name;
    document.getElementById('modalPrice').innerText = p.price + " €";
    modal.classList.add('open');
  }

  function closeModal() {
    modal.classList.remove('open');
  }

  function select(btn) {
    // Désactive les autres boutons du même groupe
    btn.parentElement.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('active'));
    // Active le cliqué
    btn.classList.add('active');
  }

  function addToCart() {
    alert("Produit ajouté !");
    closeModal();
  }

  // Fermer la modal si on clique à côté du contenu
  window.onclick = function(event) {
    if (event.target == modal) closeModal();
  }
</script>

</body>
</html>
