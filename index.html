<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verso L'Alto — Boutique</title>
  <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --primary: #2C3776;   /* Ton bleu */
      --bg: #F8F2E7;        /* Ton beige */
      --accent: #c9a84c;    /* Or pour les détails */
      --gris: #6b6b6b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--primary);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(44, 55, 118, 0.1);
      position: sticky;
      top: 0;
      background: rgba(248, 242, 231, 0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
    }
    .logo {
      font-family: 'Uncial Antiqua', serif;
      font-size: 1.6rem;
      color: var(--primary);
      text-transform: lowercase;
    }

    .cart-btn {
      background: var(--primary);
      border: none;
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    /* LAYOUT PRINCIPAL */
    .shop-container {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 2rem;
      max-width: 1300px;
      margin: 0 auto;
      padding: 3rem;
    }

    /* COLONNE GAUCHE : GALERIE */
    .product-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
    }
    .product-card {
      background: white;
      border: 1px solid rgba(44, 55, 118, 0.05);
      padding: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }
    .product-card:hover { transform: translateY(-5px); border-color: var(--primary); }
    .product-card.active { border: 2px solid var(--primary); }
    
    .product-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      margin-bottom: 1rem;
    }
    .product-card h3 {
      font-family: 'Uncial Antiqua', serif;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }
    .product-card .price { font-size: 0.8rem; color: var(--gris); }

    /* COLONNE DROITE : CONFIG */
    .config-panel {
      position: sticky;
      top: 7rem;
      height: fit-content;
      background: white;
      padding: 2rem;
      border: 1px solid rgba(44, 55, 118, 0.1);
    }
    .config-title {
      font-family: 'Uncial Antiqua', serif;
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }
    .config-price {
      font-size: 1.8rem;
      color: var(--accent);
      margin-bottom: 2rem;
    }

    .section-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1rem;
      margin-bottom: 0.8rem;
      display: block;
      color: var(--gris);
    }

    .options-row { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .opt-btn {
      border: 1px solid #ddd;
      background: none;
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-family: inherit;
      color: var(--primary);
    }
    .opt-btn.selected {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .add-btn {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: white;
      border: none;
      font-family: 'Uncial Antiqua', serif;
      cursor: pointer;
      margin-top: 1rem;
    }
    .add-btn:disabled { background: #ccc; cursor: not-allowed; }

    /* DRAWER PANIER (Style simplifié) */
    .cart-drawer {
      position: fixed; top: 0; right: 0; width: 350px; height: 100%;
      background: white; z-index: 200; transform: translateX(100%);
      transition: 0.3s; padding: 2rem; border-left: 1px solid var(--primary);
    }
    .cart-drawer.open { transform: translateX(0); }
    .cart-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: none; z-index: 150;
    }

    @media (max-width: 900px) {
      .shop-container { grid-template-columns: 1fr; padding: 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">verso l'alto</div>
  <button class="cart-btn" onclick="toggleCart(true)">
    Panier (<span id="cartCount">0</span>)
  </button>
</header>

<main class="shop-container">
  <div class="product-gallery" id="productGallery"></div>

  <aside class="config-panel" id="configPanel">
    <div id="configContent">
      <p style="color:var(--gris)">Sélectionnez un article à gauche</p>
    </div>
  </aside>
</main>

<div class="cart-overlay" id="cartOverlay" onclick="toggleCart(false)"></div>
<div class="cart-drawer" id="cartDrawer">
  <h2 style="font-family:'Uncial Antiqua'">Mon Panier</h2>
  <div id="cartItems" style="margin: 2rem 0;"></div>
  <hr>
  <div style="display:flex; justify-content:space-between; margin-top:1rem">
    <span>Total</span>
    <b id="cartTotal">0 €</b>
  </div>
  <button class="add-btn" onclick="alert('Redirection Stripe...')">Payer</button>
</div>

<script>
  /* ══════════════════════════════════════════════
     LISTE DES PRODUITS (Facile à modifier)
     ══════════════════════════════════════════════ */
  const PRODUCTS = [
    {
      id: 1,
      name: "T-Shirt 'Laisse Dieu agir'",
      price: 17,
      image: "https://via.placeholder.com/300/2C3776/F8F2E7?text=T-Shirt+01", // Remplace par tes liens FINAL.png etc
      description: "Coupe classique, coton bio.",
      sizes: ["S", "M", "L", "XL"],
      colors: ["Blanc", "Marine"]
    },
    {
      id: 2,
      name: "Sweat 'Toujours Prêt'",
      price: 33,
      image: "https://via.placeholder.com/300/2C3776/F8F2E7?text=Sweat+02",
      description: "Épais et confortable pour l'hiver.",
      sizes: ["M", "L", "XL"],
      colors: ["Marine", "Gris"]
    },
    {
      id: 3,
      name: "Hoodie 'Verso L'Alto'",
      price: 37,
      image: "https://via.placeholder.com/300/2C3776/F8F2E7?text=Hoodie+03",
      description: "Le grand classique de la boutique.",
      sizes: ["S", "M", "L"],
      colors: ["Blanc", "Noir", "Marine"]
    }
  ];

  let cart = [];
  let selectedProduct = null;
  let selectedSize = null;
  let selectedColor = null;

  /* ─── INITIALISATION ─── */
  function init() {
    const gallery = document.getElementById('productGallery');
    gallery.innerHTML = PRODUCTS.map(p => `
      <div class="product-card" onclick="selectProduct(${p.id})" id="card-${p.id}">
        <img src="${p.image}" alt="${p.name}">
        <h3>${p.name}</h3>
        <div class="price">${p.price} €</div>
      </div>
    `).join('');
  }

  /* ─── SELECTION ─── */
  function selectProduct(id) {
    selectedProduct = PRODUCTS.find(p => p.id === id);
    selectedSize = null;
    selectedColor = null;

    // Update UI active state
    document.querySelectorAll('.product-card').forEach(c => c.classList.remove('active'));
    document.getElementById(`card-${id}`).classList.add('active');

    renderConfig();
  }

  function renderConfig() {
    const panel = document.getElementById('configContent');
    if (!selectedProduct) return;

    panel.innerHTML = `
      <h2 class="config-title">${selectedProduct.name}</h2>
      <div class="config-price">${selectedProduct.price} €</div>
      <p style="font-size:0.8rem; margin-bottom:1.5rem">${selectedProduct.description}</p>

      <span class="section-label">Taille</span>
      <div class="options-row">
        ${selectedProduct.sizes.map(s => `
          <button class="opt-btn ${selectedSize === s ? 'selected' : ''}" onclick="setSize('${s}')">${s}</button>
        `).join('')}
      </div>

      <span class="section-label">Couleur</span>
      <div class="options-row">
        ${selectedProduct.colors.map(c => `
          <button class="opt-btn ${selectedColor === c ? 'selected' : ''}" onclick="setColor('${c}')">${c}</button>
        `).join('')}
      </div>

      <button class="add-btn" id="addBtn" ${!(selectedSize && selectedColor) ? 'disabled' : ''} onclick="addToCart()">
        Ajouter au panier
      </button>
    `;
  }

  function setSize(s) { selectedSize = s; renderConfig(); }
  function setColor(c) { selectedColor = c; renderConfig(); }

  /* ─── PANIER ─── */
  function addToCart() {
    const item = {
      cartId: Date.now(),
      ...selectedProduct,
      chosenSize: selectedSize,
      chosenColor: selectedColor
    };
    cart.push(item);
    updateCartUI();
    toggleCart(true);
  }

  function updateCartUI() {
    document.getElementById('cartCount').textContent = cart.length;
    const itemsDiv = document.getElementById('cartItems');
    const totalDiv = document.getElementById('cartTotal');

    if (cart.length === 0) {
      itemsDiv.innerHTML = "<p>Votre panier est vide.</p>";
    } else {
      itemsDiv.innerHTML = cart.map(item => `
        <div style="margin-bottom:1rem; font-size:0.8rem; display:flex; justify-content:space-between">
          <div>
            <b>${item.name}</b><br>
            Taille: ${item.chosenSize} | ${item.chosenColor}
          </div>
          <span>${item.price} €</span>
        </div>
      `).join('');
    }

    const total = cart.reduce((sum, i) => sum + i.price, 0);
    totalDiv.textContent = total + " €";
  }

  function toggleCart(show) {
    document.getElementById('cartDrawer').classList.toggle('open', show);
    document.getElementById('cartOverlay').style.display = show ? 'block' : 'none';
  }

  init();
</script>

</body>
</html>
