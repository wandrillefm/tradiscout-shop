<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boutique Tradiscout</title>
  <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="FINAL (1).png">
  <style>
    :root {
      --navy: #2C3776;
      --bg: #F8F2E7;
      --or: #c9a84c;
      --gris: #6b6b6b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--navy);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      padding: 1.4rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(44,55,118,0.12);
      position: sticky; top: 0;
      background: rgba(248,242,231,0.96);
      backdrop-filter: blur(8px);
      z-index: 100;
    }
    .logo { font-family: 'Uncial Antiqua', serif; font-size: 1.5rem; color: var(--navy); }
    .cart-btn {
      background: var(--navy); border: none; color: var(--bg);
      padding: 0.55rem 1.1rem; cursor: pointer;
      display: flex; align-items: center; gap: 0.5rem;
      font-family: 'DM Mono', monospace; font-size: 0.68rem;
    }
    .cart-count {
      background: var(--or); color: white; border-radius: 50%;
      width: 17px; height: 17px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.58rem;
    }

    /* ── GRILLE ── */
    .grid-wrap { max-width: 1100px; margin: 2.5rem auto; padding: 0 2rem 4rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: rgba(44,55,118,0.1);
      border: 1px solid rgba(44,55,118,0.1);
    }

    .grid-card {
      background: white;
      cursor: pointer;
      overflow: hidden;
      display: flex; flex-direction: column;
      transition: box-shadow 0.2s;
      position: relative;
    }
    .grid-card:hover { box-shadow: 0 0 0 2px var(--navy) inset; z-index: 1; }

    .grid-card img {
      width: 100%; aspect-ratio: 1/1;
      object-fit: cover; display: block;
      transition: transform 0.35s;
    }
    .grid-card:hover img { transform: scale(1.04); }

    .grid-card-info {
      padding: 0.7rem 0.8rem 0.75rem;
      border-top: 1px solid rgba(44,55,118,0.07);
    }
    .grid-card-name { font-family: 'Uncial Antiqua', serif; font-size: 0.75rem; }
    .grid-card-sub { font-size: 0.52rem; color: var(--gris); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.08em; }
    .grid-card-price { font-size: 0.68rem; color: var(--or); margin-top: 4px; }

    /* ── LIGHTBOX ── */
    .lb-overlay {
      position: fixed; inset: 0;
      background: rgba(20,22,40,0.65);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .lb-overlay.open { display: flex; }

    .lb-modal {
      background: var(--bg);
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 780px;
      width: 100%;
      max-height: 90vh;
      overflow: hidden;
      position: relative;
      animation: lbIn 0.22s ease;
    }
    @keyframes lbIn { from { opacity:0; transform: scale(0.97); } to { opacity:1; transform: scale(1); } }

    /* image gauche */
    .lb-img-wrap {
      aspect-ratio: 1/1;
      overflow: hidden;
      background: #e8e3d8;
      position: relative;
    }
    .lb-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: opacity 0.2s, transform 0.3s;
    }
    .lb-img-wrap img.fade { opacity: 0; transform: scale(1.02); }

    /* config droite */
    .lb-config {
      padding: 2rem 1.8rem;
      display: flex; flex-direction: column;
      gap: 1.1rem;
      overflow-y: auto;
      border-left: 1px solid rgba(44,55,118,0.1);
    }

    .lb-close {
      position: absolute; top: 0.8rem; right: 0.9rem;
      background: none; border: none; cursor: pointer;
      color: var(--navy); font-size: 1.2rem; opacity: 0.45;
      transition: opacity 0.15s; z-index: 10;
    }
    .lb-close:hover { opacity: 1; }

    .lb-title { font-family: 'Uncial Antiqua', serif; font-size: 1.5rem; line-height: 1.1; }
    .lb-design-tag { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gris); }
    .lb-price { font-size: 1rem; color: var(--or); }

    .opt-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .opt-label { font-size: 0.52rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--gris); border-bottom: 1px solid rgba(44,55,118,0.08); padding-bottom: 0.25rem; }
    .opt-row { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .opt-btn {
      border: 1px solid rgba(44,55,118,0.22);
      background: transparent; padding: 0.3rem 0.7rem;
      cursor: pointer; color: var(--navy);
      font-family: 'DM Mono', monospace; font-size: 0.6rem;
      transition: 0.12s;
    }
    .opt-btn:hover { border-color: var(--navy); }
    .opt-btn.sel { background: var(--navy); color: white; border-color: var(--navy); }

    .lb-add {
      width: 100%; padding: 0.85rem;
      background: var(--navy); color: white; border: none;
      font-family: 'Uncial Antiqua', serif; font-size: 1rem;
      cursor: pointer; margin-top: auto;
      transition: opacity 0.2s;
    }
    .lb-add:disabled { opacity: 0.22; cursor: not-allowed; }
    .lb-msg { font-size: 0.52rem; color: var(--gris); text-align: center; min-height: 10px; }

    /* ── DRAWER PANIER ── */
    .cart-drawer {
      position: fixed; top: 0; right: 0;
      width: 300px; height: 100%;
      background: white; z-index: 400;
      transform: translateX(100%); transition: 0.28s;
      padding: 2rem; display: flex; flex-direction: column;
      border-left: 1px solid var(--navy);
    }
    .cart-drawer.open { transform: translateX(0); }
    .cart-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      display: none; z-index: 350;
    }
    .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .drawer-close { background: none; border: none; cursor: pointer; color: var(--navy); font-size: 1.3rem; opacity: 0.45; transition: opacity 0.15s; }
    .drawer-close:hover { opacity: 1; }
    .checkout-btn {
      width: 100%; padding: 0.9rem;
      background: var(--navy); color: white; border: none;
      font-family: 'Uncial Antiqua', serif; font-size: 0.95rem; cursor: pointer;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid rgba(44,55,118,0.12);
      padding: 1.5rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
      background: rgba(248,242,231,0.6);
    }
    .footer-copy {
      font-size: 0.58rem;
      color: var(--gris);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .footer-links {
      display: flex;
      gap: 1.5rem;
    }
    .footer-links a {
      font-size: 0.58rem;
      color: var(--navy);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.55;
      transition: opacity 0.15s;
    }
    .footer-links a:hover { opacity: 1; }

    @media (max-width: 900px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 650px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .lb-modal { grid-template-columns: 1fr; max-height: 95vh; overflow-y: auto; }
      .lb-img-wrap { aspect-ratio: 1/1; }
      .lb-config { border-left: none; border-top: 1px solid rgba(44,55,118,0.1); padding: 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">tradiscout</div>
  <button class="cart-btn" onclick="openCart()">
    Panier <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<!-- LIGHTBOX -->
<div class="lb-overlay" id="lbOverlay" onclick="lbClickOutside(event)">
  <div class="lb-modal" id="lbModal">
    <div class="lb-img-wrap">
      <img id="lbImg" src="" alt="" />
    </div>
    <div class="lb-config">
      <button class="lb-close" onclick="closeLb()">✕</button>

      <div>
        <div class="lb-title" id="lbTitle"></div>
        <div class="lb-design-tag" id="lbDesignTag"></div>
        <div class="lb-price" id="lbPrice"></div>
      </div>

      <div class="opt-group">
        <span class="opt-label">Type</span>
        <div class="opt-row" id="lbTypes"></div>
      </div>

      <div class="opt-group">
        <span class="opt-label">Couleur</span>
        <div class="opt-row" id="lbColors"></div>
      </div>

      <div class="opt-group">
        <span class="opt-label">Taille</span>
        <div class="opt-row" id="lbSizes"></div>
      </div>

      <button class="lb-add" id="lbAdd" disabled onclick="addToCart()">+ Ajouter au panier</button>
      <div class="lb-msg" id="lbMsg">Sélectionnez tous les éléments</div>
    </div>
  </div>
</div>

<!-- DRAWER -->
<div class="cart-bg" id="cartBg" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="drawer-header">
    <h2 style="font-family:'Uncial Antiqua';font-size:1.4rem">Mon Panier</h2>
    <button class="drawer-close" onclick="closeCart()">✕</button>
  </div>
  <div id="cartItems" style="flex:1;overflow-y:auto"></div>
  <div style="border-top:1px solid #eee;padding-top:1rem">
    <div style="display:flex;justify-content:space-between;margin-bottom:1rem;font-size:1.05rem">
      <span>Total</span><b id="cartTotal">0 €</b>
    </div>
    <button class="checkout-btn" id="checkoutBtn" onclick="goToCheckout()">Payer →</button>
  </div>
</div>

<footer>
  <div class="footer-copy">© Tradiscout 2026</div>
  <div class="footer-links">
    <a href="Rapport Technique et Commercial.pdf" target="_blank">Détails</a>
    <a href="Politiques Commceriales et Clauses de Vente.pdf" target="_blank">Livraison</a>
    <a href="Protection des Données et conformité RGPD.pdf" target="_blank">Termes</a>
  </div>
</footer>

<script>
  // ── CATALOGUE ──
  const TYPES = [
    { id: 'tshirt', label: 'T-Shirt', price: 17 },
    { id: 'sweat',  label: 'Sweat',   price: 33 },
    { id: 'hoodie', label: 'Hoodie',  price: 37 },
  ];
  const DESIGNS = [
    { key: 'tradiscout',   label: 'Tradiscout' },
    { key: 'double-croix', label: 'Double Croix' },
    { key: 'deus-vult',    label: 'Deus Vult' },
    { key: 'verso-lalto',  label: "Verso l'Alto" },
  ];
  const SIZES  = ['S', 'M', 'L'];
  const COLORS = [
    { key: 'blanc',  label: 'Blanc' },
    { key: 'marine', label: 'Marine' },
  ];

  // image par combinaison : type-couleur-motif.png
  // grille : image par défaut = tshirt-blanc-<motif>.png
  function imgSrc(type, color, design) {
    return `${type}-${color}-${design}.png`;
  }

  // ── GRILLE : 4 cards par design (une par motif, type défaut = tshirt, couleur défaut = blanc) ──
  // En fait on fait 12 cards : 4 designs × 3 types
  // Ordre : on groupe par design pour montrer la variété
  const PRODUCTS = [];
  DESIGNS.forEach(d => {
    TYPES.forEach(t => {
      PRODUCTS.push({ uid: `${t.id}-${d.key}`, type: t.id, design: d.key });
    });
  });

  function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = PRODUCTS.map(p => {
      const t = TYPES.find(x => x.id === p.type);
      const d = DESIGNS.find(x => x.key === p.design);
      const defaultImg = imgSrc(p.type, 'bleu', p.design);
      return `
        <div class="grid-card" onclick="openLb('${p.type}', '${p.design}')">
          <img src="${defaultImg}" alt="${t.label} ${d.label}" onerror="this.style.background='#ddd';this.src=''" />
          <div class="grid-card-info">
            <div class="grid-card-name">${t.label}</div>
            <div class="grid-card-sub">${d.label}</div>
            <div class="grid-card-price">${t.price} €</div>
          </div>
        </div>
      `;
    }).join('');
  }

  // ── LIGHTBOX STATE ──
  const lb = { type: null, design: null, color: null, size: null };

  function openLb(typeId, designKey) {
    lb.type   = typeId;
    lb.design = designKey;
    lb.color  = 'blanc';   // défaut blanc
    lb.size   = null;

    renderLb();
    document.getElementById('lbOverlay').classList.add('open');
  }

  function closeLb() {
    document.getElementById('lbOverlay').classList.remove('open');
  }

  function lbClickOutside(e) {
    if (e.target === document.getElementById('lbOverlay')) closeLb();
  }

  function renderLb() {
    const t = TYPES.find(x => x.id === lb.type);
    const d = DESIGNS.find(x => x.key === lb.design);

    document.getElementById('lbTitle').textContent = t.label;
    document.getElementById('lbDesignTag').textContent = d.label;
    document.getElementById('lbPrice').textContent = t.price + ' €';

    updateLbImage();

    // Types
    document.getElementById('lbTypes').innerHTML = TYPES.map(x => `
      <button class="opt-btn ${x.id === lb.type ? 'sel' : ''}" onclick="lbSet('type','${x.id}',this)">${x.label}</button>
    `).join('');

    // Couleurs
    document.getElementById('lbColors').innerHTML = COLORS.map(x => `
      <button class="opt-btn ${x.key === lb.color ? 'sel' : ''}" onclick="lbSet('color','${x.key}',this)">${x.label}</button>
    `).join('');

    // Tailles
    document.getElementById('lbSizes').innerHTML = SIZES.map(s => `
      <button class="opt-btn ${s === lb.size ? 'sel' : ''}" onclick="lbSet('size','${s}',this)">${s}</button>
    `).join('');

    updateLbCTA();
  }

  function lbSet(cat, val, el) {
    lb[cat] = val;

    // Mettre à jour les boutons du groupe
    el.closest('.opt-row').querySelectorAll('.opt-btn').forEach(b => b.classList.remove('sel'));
    el.classList.add('sel');

    // Mettre à jour titre + prix si le type change
    if (cat === 'type') {
      const t = TYPES.find(x => x.id === val);
      document.getElementById('lbTitle').textContent = t.label;
      document.getElementById('lbPrice').textContent = t.price + ' €';
    }

    updateLbImage();
    updateLbCTA();
  }

  function updateLbImage() {
    const img = document.getElementById('lbImg');
    const src = imgSrc(lb.type, lb.color || 'blanc', lb.design);
    if (img.src.endsWith(src)) return;

    img.classList.add('fade');
    setTimeout(() => {
      img.src = src;
      img.classList.remove('fade');
    }, 180);
  }

  function updateLbCTA() {
    const ok = lb.type && lb.color && lb.size;
    document.getElementById('lbAdd').disabled = !ok;
    document.getElementById('lbMsg').textContent = ok ? '' : 'Sélectionnez tous les éléments';
  }

  // ── PANIER ──
  let cart = [];

  function addToCart() {
    const t = TYPES.find(x => x.id === lb.type);
    const d = DESIGNS.find(x => x.key === lb.design);
    const c = COLORS.find(x => x.key === lb.color);
    cart.push({
      id: Date.now(),
      type: lb.type, typeLabel: t.label,
      design: lb.design, designLabel: d.label,
      color: lb.color, colorLabel: c.label,
      size: lb.size,
      price: t.price,
    });
    renderCart();
    closeLb();
    openCart();
  }

  function renderCart() {
    const container = document.getElementById('cartItems');
    const total = cart.reduce((s, i) => s + i.price, 0);
    document.getElementById('cartCount').textContent = cart.length;
    document.getElementById('cartTotal').textContent = total + ' €';
    if (!cart.length) { container.innerHTML = '<p style="font-size:0.72rem;color:var(--gris)">Panier vide</p>'; return; }
    container.innerHTML = cart.map(item => `
      <div style="margin-bottom:1rem;border-bottom:1px solid #eee;padding-bottom:10px">
        <div style="display:flex;justify-content:space-between"><b>${item.typeLabel}</b><span>${item.price}€</span></div>
        <div style="font-size:0.6rem;color:gray;margin-top:3px">${item.designLabel} · ${item.size} · ${item.colorLabel}</div>
      </div>
    `).join('');
  }

  function openCart() {
    document.getElementById('cartDrawer').classList.add('open');
    document.getElementById('cartBg').style.display = 'block';
  }
  function closeCart() {
    document.getElementById('cartDrawer').classList.remove('open');
    document.getElementById('cartBg').style.display = 'none';
  }

  async function goToCheckout() {
    if (!cart.length) return;
    const btn = document.getElementById('checkoutBtn');
    btn.innerText = 'Chargement...'; btn.disabled = true;
    try {
      const res = await fetch('/api/checkout', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items: cart })
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'Erreur serveur'); }
      const { url } = await res.json();
      window.location.href = url;
    } catch (e) {
      alert('Erreur : ' + e.message);
      btn.innerText = 'Payer →'; btn.disabled = false;
    }
  }

  // ── INIT ──
  renderGrid();
  renderCart();
</script>
</body>
</html>
